disease: myopia
level: -1
dioptria_range: "до -3.0 диоптрий"
description: "Близорукость слабой степени"

sources:
  - title: "Клинико-функциональные параллели в цветовосприятии у пациентов с миопией"
    url: "https://cyberleninka.ru/article/n/kliniko-funktsionalnye-paralleli-v-tsvetovospriyatii-u-patsientov-s-miopiey/viewer"
  - title: "Световые сигналы и развитие близорукости"
    url: "https://link.springer.com/article/10.1007/s40123-022-00490-2"
  - title: "Сводная таблица по результатам исследования заболеваний глаз"
    url: "internal"

color_perception:
  deficit_level: "лёгкий/средний"
  weak_colors:
    - "зелёный"
  note: "Средний/низкий уровень распознавания цветов, цветослабость на зелёный спектр"

shape_perception:
  dominant_shape: "шаровидная форма (61.2%)"
  secondary_shape: "вытянутый эллипсоид (38.8%)"
  distortion: "лёгкое размытие контуров удалённых предметов, теряется чёткость границ и мелких деталей"

color_combinations:
  - id: 1
    object_color: "красный"
    object_hex: "#E63946"
    background: "белый"
    background_hex: "#FFFFFF"
    background_scene: "абстрактный"
    background_file: "plain_white.png"
    recommended: true
    note: "Красный объект на белом — максимальный контраст, красный фокусируется лучше всего"
  - id: 2
    object_color: "красный"
    object_hex: "#E63946"
    background: "голубое небо"
    background_hex: "#AEE6F8"
    background_scene: "небесный пейзаж"
    background_file: "sky_light.png"
    recommended: true
    note: "Тёплый объект на холодном фоне — высокий контраст"
  - id: 3
    object_color: "оранжевый"
    object_hex: "#F4A261"
    background: "светло-серый"
    background_hex: "#F1F1F1"
    background_scene: "абстрактный"
    background_file: "plain_lightgray.png"
    recommended: true
    note: "Оранжевый хорошо виден, нейтральный фон не отвлекает"
  - id: 4
    object_color: "жёлтый"
    object_hex: "#E9C46A"
    background: "белый"
    background_hex: "#FFFFFF"
    background_scene: "абстрактный"
    background_file: "plain_white.png"
    recommended: true
    note: "Жёлтый усиливает насыщенность — рекомендация из исследования"
  - id: 5
    object_color: "красный"
    object_hex: "#E63946"
    background: "закатное небо"
    background_hex: "#FDE8D0"
    background_scene: "закатный пейзаж"
    background_file: "sky_sunset.png"
    recommended: true
    note: "Тёплая гамма фона не конфликтует с красным объектом"

object:
  shape_start: "вытянутый эллипс"
  shape_end: "круг"
  size: "medium"
  border: "чёткий жирный контур"
  texture: "однородная"
  exercise_mechanic: >
    Объект плавно меняет форму от вытянутого эллипса до идеального круга.
    Пользователь фокусирует взгляд в момент когда объект становится кругом
    и удерживает фокус (заморозить форму). Тренировка аккомодационной гибкости.

exercises:
  - name: "circle_right"
    speed: "medium"
  - name: "horizontal"
    speed: "medium"
  - name: "vertical"
    speed: "medium"
  - name: "zigzag"
    speed: "slow"
  - name: "clock"
    speed: "medium"
  - name: "two_diagonals"
    speed: "medium"
