disease: hyperopia
level: +5
dioptria_range: "+5.0 и более диоптрий"
description: "Дальнозоркость высокой степени"

sources:
  - title: "Color perception levels in patients with hyperopia"
    url: "https://www.researchgate.net/publication/265132355_Color_perception_levels_in_patients_with_hyperopia"
  - title: "Chromotherapy — Wikipedia"
    url: "https://en.wikipedia.org/wiki/Chromotherapy"
  - title: "Гимнастика для глаз по Аветисову"
    url: "https://www.lensmaster.ru/articles/gimnastika-dlya-glaz-avetisova.html"
  - title: "Сводная таблица по результатам исследования заболеваний глаз"
    url: "internal"

color_perception:
  deficit_level: "умеренный/тяжёлый"
  weak_colors:
    - "красный (виден как бесформенное пятно)"
    - "все цвета размыты"
  note: >
    Размыты все цвета, но синий/фиолетовый (450 нм) сохраняют хоть какую-то форму.
    Часто сопровождается амблиопией (ленивый глаз) — мозг отключает нечёткое изображение.
    Активная светостимуляция паттернами красного и зелёного для пробуждения сетчатки.

shape_perception:
  dominant_shape: "сжатый эллипсоид"
  distortion: >
    Часто сопровождается амблиопией — мозг отключает нечёткое изображение.
    Плоские кольца воспринимаются без объёма.

color_combinations:
  - id: 1
    object_color: "синий"
    object_hex: "#0077B6"
    background: "белый"
    background_hex: "#FFFFFF"
    background_scene: "абстрактный"
    background_file: "plain_white.png"
    recommended: true
    note: "Синий (450 нм) сохраняет форму лучше других цветов при высокой дальнозоркости"
  - id: 2
    object_color: "зелёный"
    object_hex: "#2DC653"
    background: "тёмный"
    background_hex: "#0D1B2A"
    background_scene: "тёмный фон"
    background_file: "plain_dark.png"
    recommended: true
    note: "Зелёный паттерн для стимуляции сетчатки (рекомендация при амблиопии)"
  - id: 3
    object_color: "красный паттерн"
    object_hex: "#E63946"
    background: "тёмно-зелёный"
    background_hex: "#1B4332"
    background_scene: "тёмный лесной фон"
    background_file: "forest_dark.png"
    recommended: true
    note: "Паттерны красного и зелёного для пробуждения сетчатки и борьбы с амблиопией"
  - id: 4
    object_color: "фиолетовый"
    object_hex: "#7B2D8B"
    background: "белый"
    background_hex: "#FFFFFF"
    background_scene: "абстрактный"
    background_file: "plain_white.png"
    recommended: true
    note: "Фиолетовый (близко к 450 нм) — один из немногих различимых цветов при высокой степени"
  - id: 5
    object_color: "синий"
    object_hex: "#0077B6"
    background: "ночное небо"
    background_hex: "#03045E"
    background_scene: "ночной пейзаж"
    background_file: "sky_night_deep.png"
    recommended: true
    note: "Синий объект на тёмно-синем небе — стимуляция синего канала (450 нм)"

object:
  shape_start: "плоское кольцо"
  shape_end: "объёмный пончик (тор)"
  size: "extra_large"
  border: "очень жирный контур"
  texture: "однородная"
  exercise_mechanic: >
    Упражнение «Глубинный туннель».
    Полёт сквозь туннель из плоских колец.
    При приближении кольца должны становиться объёмными (пончиками).
    Тренировка восприятия глубины и стимуляция сетчатки.

exercises:
  - name: "circle_right"
    speed: "very_slow"
    note: "Только медленные упражнения. Частое моргание — кратковременный отдых для глаз."
  - name: "horizontal"
    speed: "very_slow"
  - name: "vertical"
    speed: "very_slow"
  - name: "zigzag"
    speed: "very_slow"
  - name: "clock"
    speed: "very_slow"
  - name: "two_diagonals"
    speed: "very_slow"
